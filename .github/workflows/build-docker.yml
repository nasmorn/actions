name: Build a plain Dockerfile and save an artifact


on:
  workflow_call:
    inputs:
      IMAGE_NAME:
        required: true
        type: string
      DOCKERFILE:
        type: string
        default: "Dockerfile"
      PLATFORM:
        type: string
        default: "linux/amd64"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: inputs.PLATFORM != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: inputs.PLATFORM != 'linux/amd64'
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push to repository
        id: build
        env:
          IMAGE_NAME: ${{ inputs.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build -f ${{ inputs.DOCKERFILE }} --platform ${{ inputs.PLATFORM }} --load -t $IMAGE_NAME:$IMAGE_TAG .
          docker save --output /tmp/${IMAGE_NAME}.tar ${IMAGE_NAME}:${IMAGE_TAG}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.IMAGE_NAME }}-${{ github.sha  }}
          path: /tmp/${{ inputs.IMAGE_NAME }}.tar
          retention-days: 1

